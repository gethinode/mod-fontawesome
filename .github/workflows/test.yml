name: Test
on:
  workflow_dispatch:
  push:
    tags:
      - v*
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        node-version: [22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    runs-on: ${{ matrix.os }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ">1.0.0"

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install Dart Sass
      env:
        DART_SASS_VERSION: "1.98.0"
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" \
            | tar -xz -C "$HOME"
          echo "$HOME/dart-sass" >> $GITHUB_PATH
        elif [ "$RUNNER_OS" == "macOS" ]; then
          ARCH=$(uname -m)
          if [ "$ARCH" == "arm64" ]; then
            SASS_ARCH="macos-arm64"
          else
            SASS_ARCH="macos-x64"
          fi
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-${SASS_ARCH}.tar.gz" \
            | tar -xz -C "$HOME"
          echo "$HOME/dart-sass" >> $GITHUB_PATH
        elif [ "$RUNNER_OS" == "Windows" ]; then
          choco install sass
        fi
      shell: bash

    - name: Perform clean install of npm
      run:  npm ci

    - name: Run the tests
      run: npm run test
