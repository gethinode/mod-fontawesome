icon: interests
example: |
  {{< icon "fas circle-check" >}}
comment: >-
  Use the icon shortcode to quickly add a Font Awesome icon to your content. You
  can also use fa for regular icons, fab for brand icons, and fas for solid
  icons.

arguments:
  page:
    optional: true
    release: v6.1.0
    comment: >-
      Page that owns the icon. When set, symbol registration in `symbols` mode
      lands on this page instead of the page that triggered the current
      rendering context, which keeps icon sprites intact when the icon renders
      in a foreign context (such as a cached partial or another page's
      `.Content` render). Falls back to the global page context when omitted.
  mode:
    type: select
    optional: true
    group: partial
    release: v6.1.0
    comment: >-
      Per-call override of the globally configured rendering mode. For example,
      pass `svg` to force a single icon to render as an inline SVG, bypassing
      sprite registration. Defaults to the mode set in the site configuration.
    options:
      values:
        - symbols
        - svg
        - webfonts
  icon:
    position: 0
    comment: >-
      Icon to include. You can use shorthand notation such as `fas sort` to
      include a Font Awesome icon. The argument also supports files with an
      `.svg` extension. Inline type definition overrides global for position support.
  src:
    type: string
    optional: true
    release: v0.22.0
    comment: >-
      Source of the icon file. If set, loads the icon from this path instead
      of using the icon name.
  inline-style:
  spacing:
    release: v0.21.0
  wrapper:
    release: v0.19.0
  class:
    optional: true
    position: 1
    comment: >-
      Modifier classes for styling and animation (e.g., `fa-2x`, `fa-spin`,
      `fa-beat`). Reintroduced in v2.0.0 after being deprecated in v1.0.0.
      Previously used for full icon specification (family, name, styling); now
      exclusively for modifier classes. When using family-specific shortcodes
      with positional arguments, all arguments after the icon name are joined
      as modifier classes.
    release: v2.0.0
  # deprecated arguments
  style:
    type: string
    optional: true
    deprecated: v1.0.0
    alternative: inline-style
  scale:
    release: v0.24.0
    deprecated: v2.0.0
    comment: >-
      Deprecated. This parameter is no longer used by the icon rendering engine.
